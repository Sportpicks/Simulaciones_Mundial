<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Gestión de Picks</title>
<style>
:root{--bg:#0d1220;--panel:#161d31;--panel2:#1c2540;--tx:#eef1f8;--tx2:#9aa5c0;
--lin:#2a3554;--v:#34d399;--e:#fbbf24;--d:#fb7185;--ac:#60a5fa;--pu:#a78bfa}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font:15px/1.6 system-ui,sans-serif;padding:24px}
h1{font-size:1.4rem;margin-bottom:24px;color:var(--ac)}
h2{font-size:1rem;margin:24px 0 12px;color:var(--tx2)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
label{display:block;font-size:.8rem;color:var(--tx2);margin-bottom:4px}
input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--lin);
color:var(--tx);border-radius:8px;padding:8px 12px;font-size:.9rem;outline:none}
input:focus,select:focus{border-color:var(--ac)}
.card{background:var(--panel);border:1px solid var(--lin);border-radius:14px;padding:20px;margin-bottom:16px}
.btn{background:var(--ac);color:#0d1220;border:none;border-radius:8px;padding:10px 20px;
font-size:.9rem;font-weight:700;cursor:pointer;width:100%;margin-top:12px}
.btn:hover{opacity:.9}
.btn-danger{background:var(--d);margin-top:4px}
.btn-success{background:var(--v)}
.btn-warn{background:var(--e)}
.badge{display:inline-block;border-radius:6px;padding:2px 8px;font-size:.75rem;font-weight:600}
.badge-p{background:#1c2540;color:var(--e)}
.badge-w{background:#1a2e1a;color:var(--v)}
.badge-l{background:#2e1a1a;color:var(--d)}
.badge-v{background:#1a1a2e;color:var(--pu)}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--lin)}
th{color:var(--tx2);font-size:.76rem;text-transform:uppercase}
.stat-box{background:var(--panel2);border-radius:10px;padding:14px;text-align:center}
.stat-box .val{font-size:1.4rem;font-weight:700;color:var(--ac)}
.stat-box .lbl{font-size:.75rem;color:var(--tx2);margin-top:2px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.green{color:var(--v)} .red{color:var(--d)} .yellow{color:var(--e)}
select option{background:#1c2540}
.bankroll-info{background:var(--panel2);border-radius:10px;padding:12px 16px;margin-bottom:16px;
display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.bankroll-info input{max-width:150px}
</style>
</head>
<body>
<h1>⚙️ Panel Admin — Gestión de Picks</h1>

<!-- Bankroll inicial -->
<div class="card">
  <h2>💰 Configuración del Bankroll</h2>
  <div class="bankroll-info">
    <div>
      <label>Bankroll inicial (USD)</label>
      <input type="number" id="bankroll-inicial" placeholder="Ej: 100" min="1">
    </div>
    <div>
      <label>Bankroll actual (USD)</label>
      <input type="number" id="bankroll-actual" placeholder="Se calcula automático" readonly style="opacity:.6">
    </div>
    <button class="btn" style="width:auto;margin-top:20px" onclick="setBankroll()">Guardar bankroll</button>
  </div>
</div>

<!-- Estadísticas -->
<div class="stats-grid" id="stats-grid">
  <div class="stat-box"><div class="val" id="st-total">0</div><div class="lbl">Picks totales</div></div>
  <div class="stat-box"><div class="val green" id="st-won">0</div><div class="lbl">Ganados ✅</div></div>
  <div class="stat-box"><div class="val red" id="st-lost">0</div><div class="lbl">Perdidos ❌</div></div>
  <div class="stat-box"><div class="val" id="st-roi">0%</div><div class="lbl">ROI</div></div>
</div>

<!-- Formulario nuevo pick -->
<div class="card">
  <h2>➕ Nuevo Pick</h2>
  <div class="grid">
    <div><label>Partido</label><input id="f-partido" placeholder="Ej: Francia vs Irak"></div>
    <div><label>Fecha del partido</label><input id="f-fecha" type="date"></div>
  </div>
  <div class="grid3" style="margin-top:10px">
    <div>
      <label>Mercado</label>
      <select id="f-mercado">
        <option>1X2 — Victoria local</option>
        <option>1X2 — Empate</option>
        <option>1X2 — Victoria visitante</option>
        <option>Más de 0.5 goles</option>
        <option>Más de 1.5 goles</option>
        <option>Más de 2.5 goles</option>
        <option>Más de 3.5 goles</option>
        <option>Ambos anotan — Sí</option>
        <option>Ambos anotan — No</option>
        <option>Córners más de 7.5</option>
        <option>Córners más de 8.5</option>
        <option>Córners más de 9.5</option>
        <option>Tarjetas más de 3.5</option>
        <option>Tarjetas más de 4.5</option>
        <option>Tiros puerta más de 4.5</option>
        <option>Tiros puerta más de 5.5</option>
        <option>Faltas más de 18.5</option>
        <option>Faltas más de 20.5</option>
        <option>Otro</option>
      </select>
    </div>
    <div><label>Cuota decimal</label><input id="f-cuota" type="number" step="0.01" placeholder="Ej: 1.75"></div>
    <div>
      <label>Confianza</label>
      <select id="f-confianza">
        <option value="media">⚠️ Media</option>
        <option value="alta">🟡 Alta</option>
        <option value="muy-alta">🟢 Muy Alta</option>
      </select>
    </div>
  </div>
  <div class="grid" style="margin-top:10px">
    <div><label>% del bankroll apostado</label><input id="f-pct" type="number" step="0.5" min="0.5" max="10" placeholder="Ej: 2"></div>
    <div><label>Análisis / Razón del pick (opcional)</label><input id="f-razon" placeholder="Ej: Francia favorita clara, Mbappé en racha"></div>
  </div>
  <button class="btn" onclick="agregarPick()">➕ Agregar Pick</button>
</div>

<!-- Lista de picks -->
<div class="card">
  <h2>📋 Historial de Picks</h2>
  <div style="overflow-x:auto">
    <table id="tabla-picks">
      <thead>
        <tr>
          <th>Fecha</th><th>Partido</th><th>Mercado</th><th>Cuota</th>
          <th>%</th><th>Confianza</th><th>Estado</th><th>P/G</th><th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tbody-picks"></tbody>
    </table>
  </div>
  <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
    <button class="btn" style="background:var(--panel2);color:var(--tx);width:auto" onclick="exportarJSON()">📥 Exportar picks.json</button>
    <button class="btn" style="background:var(--pu);width:auto" onclick="copiarParaTelegram()">📱 Copiar para Telegram</button>
  </div>
</div>

<script>
// ── Storage ──────────────────────────────────────────────────────────────────
const KEY_PICKS     = 'tipster_picks_v1';
const KEY_BANKROLL  = 'tipster_bankroll_v1';

function cargarPicks(){ try{ return JSON.parse(localStorage.getItem(KEY_PICKS)||'[]'); }catch{ return []; } }
function guardarPicks(p){ localStorage.setItem(KEY_PICKS, JSON.stringify(p)); }
function cargarBankroll(){ return JSON.parse(localStorage.getItem(KEY_BANKROLL)||'{"inicial":100,"actual":100}'); }
function guardarBankroll(b){ localStorage.setItem(KEY_BANKROLL, JSON.stringify(b)); }

// ── Bankroll ──────────────────────────────────────────────────────────────────
function setBankroll(){
  const v = parseFloat(document.getElementById('bankroll-inicial').value);
  if(!v||v<=0){ alert('Ingresa un bankroll válido'); return; }
  const b = {inicial: v, actual: v};
  guardarBankroll(b);
  recalcularBankroll();
  alert('✅ Bankroll guardado: $'+v);
}

function recalcularBankroll(){
  const picks = cargarPicks();
  let b = cargarBankroll();
  let bank = b.inicial;
  picks.forEach(p => {
    if(p.estado === 'ganado'){
      bank += bank * (p.pct/100) * (p.cuota - 1);
    } else if(p.estado === 'perdido'){
      bank -= bank * (p.pct/100);
    }
  });
  b.actual = Math.round(bank * 100) / 100;
  guardarBankroll(b);
  document.getElementById('bankroll-actual').value = '$' + b.actual;
  document.getElementById('bankroll-inicial').value = b.inicial;
}

// ── Agregar pick ──────────────────────────────────────────────────────────────
function agregarPick(){
  const partido   = document.getElementById('f-partido').value.trim();
  const fecha     = document.getElementById('f-fecha').value;
  const mercado   = document.getElementById('f-mercado').value;
  const cuota     = parseFloat(document.getElementById('f-cuota').value);
  const pct       = parseFloat(document.getElementById('f-pct').value);
  const confianza = document.getElementById('f-confianza').value;
  const razon     = document.getElementById('f-razon').value.trim();

  if(!partido||!fecha||!cuota||!pct){
    alert('Completa todos los campos obligatorios'); return;
  }
  if(pct > 10){ alert('No se recomienda apostar más del 10% del bankroll'); return; }

  const picks = cargarPicks();
  picks.unshift({
    id: Date.now(),
    fecha, partido, mercado, cuota, pct, confianza, razon,
    estado: 'pendiente',
    fecha_creacion: new Date().toISOString()
  });
  guardarPicks(picks);
  renderTabla();
  actualizarStats();
  // Limpiar formulario
  ['f-partido','f-cuota','f-pct','f-razon'].forEach(id => document.getElementById(id).value='');
  document.getElementById('f-fecha').value='';
}

// ── Cambiar estado ────────────────────────────────────────────────────────────
function cambiarEstado(id, estado){
  const picks = cargarPicks();
  const p = picks.find(x => x.id === id);
  if(p) p.estado = estado;
  guardarPicks(picks);
  recalcularBankroll();
  renderTabla();
  actualizarStats();
}

function eliminarPick(id){
  if(!confirm('¿Eliminar este pick?')) return;
  const picks = cargarPicks().filter(x => x.id !== id);
  guardarPicks(picks);
  recalcularBankroll();
  renderTabla();
  actualizarStats();
}

// ── Render tabla ──────────────────────────────────────────────────────────────
function renderTabla(){
  const picks = cargarPicks();
  const b = cargarBankroll();
  const tbody = document.getElementById('tbody-picks');
  if(!picks.length){
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:var(--tx2);padding:20px">No hay picks aún</td></tr>';
    return;
  }

  let bankSim = b.inicial;
  const rowsReversed = [...picks].reverse();
  const pgMap = {};
  rowsReversed.forEach(p => {
    let pg = 0;
    if(p.estado==='ganado')  { pg = bankSim * (p.pct/100) * (p.cuota-1); bankSim += pg; }
    else if(p.estado==='perdido') { pg = -bankSim * (p.pct/100); bankSim += pg; }
    pgMap[p.id] = pg;
  });

  tbody.innerHTML = picks.map(p => {
    const estadoBadge = p.estado==='ganado' ? '<span class="badge badge-w">✅ Ganado</span>'
      : p.estado==='perdido' ? '<span class="badge badge-l">❌ Perdido</span>'
      : p.estado==='void' ? '<span class="badge badge-v">🔄 Void</span>'
      : '<span class="badge badge-p">⏳ Pendiente</span>';
    const conf = p.confianza==='muy-alta' ? '🟢 Muy Alta' : p.confianza==='alta' ? '🟡 Alta' : '⚠️ Media';
    const pg = pgMap[p.id] || 0;
    const pgStr = pg===0 ? '—' : (pg>0 ? '<span class="green">+$'+pg.toFixed(2)+'</span>' : '<span class="red">$'+pg.toFixed(2)+'</span>');
    return `<tr>
      <td>${p.fecha}</td>
      <td><b>${p.partido}</b>${p.razon?'<br><small style="color:var(--tx2)">'+p.razon+'</small>':''}</td>
      <td style="font-size:.78rem">${p.mercado}</td>
      <td>${p.cuota}</td>
      <td>${p.pct}%</td>
      <td>${conf}</td>
      <td>${estadoBadge}</td>
      <td>${pgStr}</td>
      <td style="white-space:nowrap">
        ${p.estado==='pendiente'?`
        <button onclick="cambiarEstado(${p.id},'ganado')" class="btn btn-success" style="width:auto;padding:3px 8px;font-size:.75rem;margin:1px">✅</button>
        <button onclick="cambiarEstado(${p.id},'perdido')" class="btn btn-danger" style="width:auto;padding:3px 8px;font-size:.75rem;margin:1px">❌</button>
        <button onclick="cambiarEstado(${p.id},'void')" class="btn btn-warn" style="width:auto;padding:3px 8px;font-size:.75rem;margin:1px">🔄</button>
        `:''}
        <button onclick="eliminarPick(${p.id})" class="btn btn-danger" style="width:auto;padding:3px 8px;font-size:.75rem;margin:1px">🗑️</button>
      </td>
    </tr>`;
  }).join('');
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function actualizarStats(){
  const picks = cargarPicks();
  const resueltos = picks.filter(p => p.estado!=='pendiente' && p.estado!=='void');
  const ganados   = picks.filter(p => p.estado==='ganado');
  const perdidos  = picks.filter(p => p.estado==='perdido');
  const b = cargarBankroll();
  const roi = b.inicial > 0 ? ((b.actual - b.inicial) / b.inicial * 100).toFixed(1) : 0;

  document.getElementById('st-total').textContent = picks.length;
  document.getElementById('st-won').textContent   = ganados.length;
  document.getElementById('st-lost').textContent  = perdidos.length;
  const roiEl = document.getElementById('st-roi');
  roiEl.textContent = (roi >= 0 ? '+' : '') + roi + '%';
  roiEl.className   = 'val ' + (roi >= 0 ? 'green' : 'red');
}

// ── Exportar JSON ─────────────────────────────────────────────────────────────
function exportarJSON(){
  const picks = cargarPicks();
  const blob = new Blob([JSON.stringify({picks, bankroll: cargarBankroll()}, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'picks_mundial2026.json';
  a.click();
}

// ── Copiar para Telegram ──────────────────────────────────────────────────────
function copiarParaTelegram(){
  const picks = cargarPicks().filter(p => p.estado==='pendiente');
  if(!picks.length){ alert('No hay picks pendientes'); return; }
  const b = cargarBankroll();
  let txt = '⚽ *PICKS DEL DÍA — Mundial 2026*\n';
  txt += `💰 Bankroll: $${b.actual}\n\n`;
  picks.forEach((p,i) => {
    const conf = p.confianza==='muy-alta'?'🟢 MUY ALTA':p.confianza==='alta'?'🟡 ALTA':'⚠️ MEDIA';
    txt += `*${i+1}. ${p.partido}*\n`;
    txt += `📌 ${p.mercado}\n`;
    txt += `💵 Cuota: ${p.cuota} | ${p.pct}% del bank\n`;
    txt += `🎯 Confianza: ${conf}\n`;
    if(p.razon) txt += `📊 ${p.razon}\n`;
    txt += '\n';
  });
  txt += '⚠️ _Apuesta con responsabilidad. Esto no es consejo financiero._';
  navigator.clipboard.writeText(txt).then(() => alert('✅ Copiado para Telegram'));
}

// ── Init ──────────────────────────────────────────────────────────────────────
recalcularBankroll();
renderTabla();
actualizarStats();
document.getElementById('f-fecha').valueAsDate = new Date();
</script>
</body>
</html>
